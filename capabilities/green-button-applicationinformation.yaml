naftiko: 1.0.0-alpha2
info:
  label: Xcel Energy Green Button Connect My Data API — ApplicationInformation
  description: 'Xcel Energy Green Button Connect My Data API — ApplicationInformation. 1 operations. Lead operation: Retrieve
    application registration details. Self-contained Naftiko capability covering one Xcel Energy business surface.'
  tags:
  - Xcel Energy
  - ApplicationInformation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    XCEL_ENERGY_API_KEY: XCEL_ENERGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: green-button-applicationinformation
    baseUri: https://api.xcelenergy.com/DataCustodian/espi/1_1/resource
    description: Xcel Energy Green Button Connect My Data API — ApplicationInformation business capability. Self-contained,
      no shared references.
    resources:
    - name: ApplicationInformation-applicationInformationId
      path: /ApplicationInformation/{applicationInformationId}
      operations:
      - name: getapplicationinformation
        method: GET
        description: Retrieve application registration details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.XCEL_ENERGY_API_KEY}}'
  exposes:
  - type: rest
    namespace: green-button-applicationinformation-rest
    port: 8080
    description: REST adapter for Xcel Energy Green Button Connect My Data API — ApplicationInformation. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/applicationinformation/{applicationinformationid}
      name: applicationinformation-applicationinformationid
      description: REST surface for ApplicationInformation-applicationInformationId.
      operations:
      - method: GET
        name: getapplicationinformation
        description: Retrieve application registration details
        call: green-button-applicationinformation.getapplicationinformation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: green-button-applicationinformation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Xcel Energy Green Button Connect My Data API — ApplicationInformation. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-application-registration-details
      description: Retrieve application registration details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: green-button-applicationinformation.getapplicationinformation
      outputParameters:
      - type: object
        mapping: $.
