naftiko: 1.0.0-alpha2
info:
  label: Xcel Energy Green Button Connect My Data API — ServiceStatus
  description: 'Xcel Energy Green Button Connect My Data API — ServiceStatus. 1 operations. Lead operation: Get current service
    status. Self-contained Naftiko capability covering one Xcel Energy business surface.'
  tags:
  - Xcel Energy
  - ServiceStatus
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    XCEL_ENERGY_API_KEY: XCEL_ENERGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: green-button-servicestatus
    baseUri: https://api.xcelenergy.com/DataCustodian/espi/1_1/resource
    description: Xcel Energy Green Button Connect My Data API — ServiceStatus business capability. Self-contained, no shared
      references.
    resources:
    - name: ReadServiceStatus
      path: /ReadServiceStatus
      operations:
      - name: readservicestatus
        method: GET
        description: Get current service status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.XCEL_ENERGY_API_KEY}}'
  exposes:
  - type: rest
    namespace: green-button-servicestatus-rest
    port: 8080
    description: REST adapter for Xcel Energy Green Button Connect My Data API — ServiceStatus. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/readservicestatus
      name: readservicestatus
      description: REST surface for ReadServiceStatus.
      operations:
      - method: GET
        name: readservicestatus
        description: Get current service status
        call: green-button-servicestatus.readservicestatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: green-button-servicestatus-mcp
    port: 9090
    transport: http
    description: MCP adapter for Xcel Energy Green Button Connect My Data API — ServiceStatus. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-current-service-status
      description: Get current service status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: green-button-servicestatus.readservicestatus
      outputParameters:
      - type: object
        mapping: $.
