naftiko: 1.0.0-alpha2
info:
  label: Xcel Energy Green Button Connect My Data API — UsagePoint
  description: 'Xcel Energy Green Button Connect My Data API — UsagePoint. 2 operations. Lead operation: List UsagePoints
    for a subscription. Self-contained Naftiko capability covering one Xcel Energy business surface.'
  tags:
  - Xcel Energy
  - UsagePoint
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    XCEL_ENERGY_API_KEY: XCEL_ENERGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: green-button-usagepoint
    baseUri: https://api.xcelenergy.com/DataCustodian/espi/1_1/resource
    description: Xcel Energy Green Button Connect My Data API — UsagePoint business capability. Self-contained, no shared
      references.
    resources:
    - name: Subscription-subscriptionId-UsagePoint
      path: /Subscription/{subscriptionId}/UsagePoint
      operations:
      - name: listusagepoints
        method: GET
        description: List UsagePoints for a subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: Subscription-subscriptionId-UsagePoint-usagePointId
      path: /Subscription/{subscriptionId}/UsagePoint/{usagePointId}
      operations:
      - name: getusagepoint
        method: GET
        description: Retrieve a single UsagePoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.XCEL_ENERGY_API_KEY}}'
  exposes:
  - type: rest
    namespace: green-button-usagepoint-rest
    port: 8080
    description: REST adapter for Xcel Energy Green Button Connect My Data API — UsagePoint. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/subscription/{subscriptionid}/usagepoint
      name: subscription-subscriptionid-usagepoint
      description: REST surface for Subscription-subscriptionId-UsagePoint.
      operations:
      - method: GET
        name: listusagepoints
        description: List UsagePoints for a subscription
        call: green-button-usagepoint.listusagepoints
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscription/{subscriptionid}/usagepoint/{usagepointid}
      name: subscription-subscriptionid-usagepoint-usagepointid
      description: REST surface for Subscription-subscriptionId-UsagePoint-usagePointId.
      operations:
      - method: GET
        name: getusagepoint
        description: Retrieve a single UsagePoint
        call: green-button-usagepoint.getusagepoint
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: green-button-usagepoint-mcp
    port: 9090
    transport: http
    description: MCP adapter for Xcel Energy Green Button Connect My Data API — UsagePoint. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-usagepoints-subscription
      description: List UsagePoints for a subscription
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: green-button-usagepoint.listusagepoints
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-single-usagepoint
      description: Retrieve a single UsagePoint
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: green-button-usagepoint.getusagepoint
      outputParameters:
      - type: object
        mapping: $.
