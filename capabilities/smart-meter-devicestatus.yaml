naftiko: 1.0.0-alpha2
info:
  label: Xcel Energy Smart Meter IEEE 2030.5 API — DeviceStatus
  description: 'Xcel Energy Smart Meter IEEE 2030.5 API — DeviceStatus. 1 operations. Lead operation: Get DeviceStatus. Self-contained
    Naftiko capability covering one Xcel Energy business surface.'
  tags:
  - Xcel Energy
  - DeviceStatus
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    XCEL_ENERGY_API_KEY: XCEL_ENERGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: smart-meter-devicestatus
    baseUri: https://{meterHost}
    description: Xcel Energy Smart Meter IEEE 2030.5 API — DeviceStatus business capability. Self-contained, no shared references.
    resources:
    - name: edev-edevId-dstat
      path: /edev/{edevId}/dstat
      operations:
      - name: getdevicestatus
        method: GET
        description: Get DeviceStatus
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: smart-meter-devicestatus-rest
    port: 8080
    description: REST adapter for Xcel Energy Smart Meter IEEE 2030.5 API — DeviceStatus. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/edev/{edevid}/dstat
      name: edev-edevid-dstat
      description: REST surface for edev-edevId-dstat.
      operations:
      - method: GET
        name: getdevicestatus
        description: Get DeviceStatus
        call: smart-meter-devicestatus.getdevicestatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: smart-meter-devicestatus-mcp
    port: 9090
    transport: http
    description: MCP adapter for Xcel Energy Smart Meter IEEE 2030.5 API — DeviceStatus. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-devicestatus
      description: Get DeviceStatus
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: smart-meter-devicestatus.getdevicestatus
      outputParameters:
      - type: object
        mapping: $.
