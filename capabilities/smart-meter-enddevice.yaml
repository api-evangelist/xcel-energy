naftiko: 1.0.0-alpha2
info:
  label: Xcel Energy Smart Meter IEEE 2030.5 API — EndDevice
  description: 'Xcel Energy Smart Meter IEEE 2030.5 API — EndDevice. 5 operations. Lead operation: List EndDevices. Self-contained
    Naftiko capability covering one Xcel Energy business surface.'
  tags:
  - Xcel Energy
  - EndDevice
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    XCEL_ENERGY_API_KEY: XCEL_ENERGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: smart-meter-enddevice
    baseUri: https://{meterHost}
    description: Xcel Energy Smart Meter IEEE 2030.5 API — EndDevice business capability. Self-contained, no shared references.
    resources:
    - name: edev
      path: /edev
      operations:
      - name: listenddevices
        method: GET
        description: List EndDevices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createenddevice
        method: POST
        description: Register a new EndDevice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: edev-edevId
      path: /edev/{edevId}
      operations:
      - name: getenddevice
        method: GET
        description: Get an EndDevice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateenddevice
        method: PUT
        description: Update an EndDevice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteenddevice
        method: DELETE
        description: Delete an EndDevice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: smart-meter-enddevice-rest
    port: 8080
    description: REST adapter for Xcel Energy Smart Meter IEEE 2030.5 API — EndDevice. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/edev
      name: edev
      description: REST surface for edev.
      operations:
      - method: GET
        name: listenddevices
        description: List EndDevices
        call: smart-meter-enddevice.listenddevices
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createenddevice
        description: Register a new EndDevice
        call: smart-meter-enddevice.createenddevice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edev/{edevid}
      name: edev-edevid
      description: REST surface for edev-edevId.
      operations:
      - method: GET
        name: getenddevice
        description: Get an EndDevice
        call: smart-meter-enddevice.getenddevice
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateenddevice
        description: Update an EndDevice
        call: smart-meter-enddevice.updateenddevice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteenddevice
        description: Delete an EndDevice
        call: smart-meter-enddevice.deleteenddevice
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: smart-meter-enddevice-mcp
    port: 9090
    transport: http
    description: MCP adapter for Xcel Energy Smart Meter IEEE 2030.5 API — EndDevice. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-enddevices
      description: List EndDevices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: smart-meter-enddevice.listenddevices
      outputParameters:
      - type: object
        mapping: $.
    - name: register-new-enddevice
      description: Register a new EndDevice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: smart-meter-enddevice.createenddevice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-enddevice
      description: Get an EndDevice
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: smart-meter-enddevice.getenddevice
      outputParameters:
      - type: object
        mapping: $.
    - name: update-enddevice
      description: Update an EndDevice
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: smart-meter-enddevice.updateenddevice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-enddevice
      description: Delete an EndDevice
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: smart-meter-enddevice.deleteenddevice
      outputParameters:
      - type: object
        mapping: $.
