naftiko: 1.0.0-alpha2
info:
  label: Xcel Energy Smart Meter IEEE 2030.5 API — Log
  description: 'Xcel Energy Smart Meter IEEE 2030.5 API — Log. 1 operations. Lead operation: List LogEvents. Self-contained
    Naftiko capability covering one Xcel Energy business surface.'
  tags:
  - Xcel Energy
  - Log
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    XCEL_ENERGY_API_KEY: XCEL_ENERGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: smart-meter-log
    baseUri: https://{meterHost}
    description: Xcel Energy Smart Meter IEEE 2030.5 API — Log business capability. Self-contained, no shared references.
    resources:
    - name: edev-edevId-log
      path: /edev/{edevId}/log
      operations:
      - name: listlogevents
        method: GET
        description: List LogEvents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: smart-meter-log-rest
    port: 8080
    description: REST adapter for Xcel Energy Smart Meter IEEE 2030.5 API — Log. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/edev/{edevid}/log
      name: edev-edevid-log
      description: REST surface for edev-edevId-log.
      operations:
      - method: GET
        name: listlogevents
        description: List LogEvents
        call: smart-meter-log.listlogevents
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: smart-meter-log-mcp
    port: 9090
    transport: http
    description: MCP adapter for Xcel Energy Smart Meter IEEE 2030.5 API — Log. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-logevents
      description: List LogEvents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: smart-meter-log.listlogevents
      outputParameters:
      - type: object
        mapping: $.
