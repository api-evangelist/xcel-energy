naftiko: 1.0.0-alpha2
info:
  label: Xcel Energy Smart Meter IEEE 2030.5 API — PowerStatus
  description: 'Xcel Energy Smart Meter IEEE 2030.5 API — PowerStatus. 1 operations. Lead operation: Get PowerStatus. Self-contained
    Naftiko capability covering one Xcel Energy business surface.'
  tags:
  - Xcel Energy
  - PowerStatus
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    XCEL_ENERGY_API_KEY: XCEL_ENERGY_API_KEY
capability:
  consumes:
  - type: http
    namespace: smart-meter-powerstatus
    baseUri: https://{meterHost}
    description: Xcel Energy Smart Meter IEEE 2030.5 API — PowerStatus business capability. Self-contained, no shared references.
    resources:
    - name: edev-edevId-ps
      path: /edev/{edevId}/ps
      operations:
      - name: getpowerstatus
        method: GET
        description: Get PowerStatus
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: smart-meter-powerstatus-rest
    port: 8080
    description: REST adapter for Xcel Energy Smart Meter IEEE 2030.5 API — PowerStatus. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/edev/{edevid}/ps
      name: edev-edevid-ps
      description: REST surface for edev-edevId-ps.
      operations:
      - method: GET
        name: getpowerstatus
        description: Get PowerStatus
        call: smart-meter-powerstatus.getpowerstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: smart-meter-powerstatus-mcp
    port: 9090
    transport: http
    description: MCP adapter for Xcel Energy Smart Meter IEEE 2030.5 API — PowerStatus. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-powerstatus
      description: Get PowerStatus
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: smart-meter-powerstatus.getpowerstatus
      outputParameters:
      - type: object
        mapping: $.
