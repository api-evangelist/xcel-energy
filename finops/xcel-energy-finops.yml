specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Xcel Energy
providerId: xcel-energy
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Energy Data
  - Utility
  - Green Button
description: 'FinOps shape for Xcel Energy is non-commercial: API access is provided to customers
  and authorized third parties under ESPI / Green Button regulation rather than as a billable
  service. There is no Xcel-issued invoice for API usage and no public per-request meter.'
sources:
  - https://developer-apim.aws.xcelenergy.com/
  - https://my.xcelenergy.com/s/
notes: Xcel Energy does not bill for API access. The provider's commercial relationship with
  customers is energy delivery, not data access. FOCUS columns are populated for completeness;
  meters reflect data-volume telemetry rather than billable line items.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Xcel Energy Inc.
serviceCategory: Regulated Utility / Energy Data
billingModel:
  pricingCategory: Non-Commercial (Regulated Data Sharing)
  billingFrequency: N/A
  billingCurrency: USD
  chargeCategories: []
focusColumns:
  ServiceName: Xcel Energy Developer APIs
  ServiceCategory: Regulated Utility / Energy Data
  ProviderName: Xcel Energy
  PublisherName: Xcel Energy Inc.
  InvoiceIssuerName: Xcel Energy Inc.
  BillingCurrency: USD
meters:
  - name: espi_data_volume
    unit: GB
    aggregation: sum
    dimensions:
      - third_party_provider
      - customer_authorization
principles:
  - name: Visibility
    description: Third-party providers see ESPI data flow through their own ingestion pipeline;
      Xcel does not publish a usage dashboard for downstream consumers.
  - name: Allocation
    description: Allocation occurs at the third-party provider's own infrastructure (per
      authorized customer or per service offering), not on a Xcel invoice.
  - name: Optimization
    description: Levers are ESPI subscription cadence (daily vs. real-time), batch sizing on
      NotificationLink callbacks, and limiting authorized data scope to what the application
      needs.
  - name: Accountability
    description: The third-party provider's product team owns the integration; Xcel's role is
      regulated data fiduciary rather than billable counterparty.
