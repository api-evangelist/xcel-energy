description: Xcel Energy is a regulated U.S. electric and natural gas utility. Its developer
  portal at developer-apim.aws.xcelenergy.com hosts Green Button Connect My Data (ESPI / NAESB)
  endpoints and IEEE 2030.5 smart-meter access. There is no public pricing page; Green Button and
  ESPI access for authorized third parties is governed by state public-utility-commission rules
  and Xcel's third-party-provider onboarding process, not a commercial API price list.
sources:
  - https://developer-apim.aws.xcelenergy.com/
  - https://my.xcelenergy.com/s/
notes: Xcel Energy does not publish a commercial pricing list for its API surface. Access to the
  developer portal and to ESPI / Green Button data flows requires customer authorization via
  OAuth and (for third-party providers) regulator-approved onboarding. Trimmed to a single
  authorization-based plan pending direct confirmation from Xcel.
plans:
  - id: xcel-energy-authorized-third-party
    name: Authorized Third-Party Access
    type: enterprise
    description: Access to Xcel Energy's Green Button Connect My Data and IEEE 2030.5 smart-meter
      APIs is provided to customers (via OAuth authorization) and to onboarded third-party
      providers. There is no published commercial price; data access is governed by ESPI / NAESB
      and state regulatory frameworks rather than a Xcel-set fee.
    entries:
      - label: ESPI / Green Button data access
        name: green_button_access
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: US
        unit: 1
        price: contact xcel energy
        userMultiplied: false
    elements:
      - name: Xcel Energy Green Button Connect My Data API
      - name: Xcel Energy Smart Meter IEEE 2030.5 API
